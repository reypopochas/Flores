<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <link rel="stylesheet" href="Design.css">
</head>
<body>
    
    <div class="ContenedorNubes" id="ContenedorNubes">
        <img src="img/nube1.png" alt="" id="nube1" class="flotando">
        <img src="img/nube2.png" alt="" id="nube2" class="flotando-retraso">
    </div>

    <div class="ContenedorTitulo1" id="ContenedorTitulo1"></div>

    <div class="ContenedorTipoFlor" id ="ContenedorTipoFlor">
        <div class="TipoFLorTexto" id="TipoFLorTexto"></div>

        <div class="OpcionesFlores" id="OpcionesFlores">
            <div class="TarjetaFlor" data-flor="camelia">
                <img src="img/camelia.png" alt="Camelia">
                <span>Camelia</span>
            </div>
            <div class="TarjetaFlor" data-flor="girasol">
                <img src="img/girasol.png" alt="Girasol">
                <span>Girasol</span>
            </div>
            <div class="TarjetaFlor" data-flor="margarita">
                <img src="img/margarita.png" alt="Margarita">
                <span>Margarita</span>
            </div>
            <div class="TarjetaFlor" data-flor="orquidea">
                <img src="img/orquidea.png" alt="Orquídea">
                <span>Orquídea</span>
            </div>
            <div class="TarjetaFlor" data-flor="dalia">
                <img src="img/dalia.png" alt="Dalia">
                <span>Dalia</span>
            </div>
            <div class="TarjetaFlor" data-flor="tulipan">
                <img src="img/tulipan.png" alt="Tulipan">
                <span>Tulipan</span>
            </div>
        </div>
        <button id="BtnConfirmar" class="BtnOculto">Confirmar Selección</button>
    </div>

</div>

    <script src="Logica.js"></script>
</body>
</html>
